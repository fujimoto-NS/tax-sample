<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2f6fcf">
<title>税理士試験 3分チェック</title>
<style>
  :root {
    --blue: #2f6fcf;
    --blue-dark: #1f4f9c;
    --blue-pale: #eef5ff;
    --ink: #1e293b;
    --muted: #64748b;
    --line: #d9e2f0;
    --surface: #ffffff;
    --background: #f4f7fb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.7;
    margin: 0;
    padding: 20px 16px 40px;
    background: var(--background);
    color: var(--ink);
  }

  main {
    width: min(100%, 760px);
    margin: 0 auto;
  }

  .hero {
    padding: 10px 4px 24px;
  }

  .eyebrow {
    display: inline-block;
    margin: 0 0 8px;
    color: var(--blue);
    font-size: 13px;
    font-weight: bold;
    letter-spacing: .08em;
  }

  h1 {
    margin: 0;
    font-size: clamp(25px, 7vw, 34px);
    line-height: 1.35;
  }

  .lead {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 15px;
  }

  .panel {
    background: var(--surface);
    border-radius: 18px;
    box-shadow: 0 5px 18px rgba(31, 79, 156, .09);
    padding: 20px 16px;
  }

  h2 {
    margin: 0 0 16px;
    font-size: 20px;
  }

  .subject-list {
    display: grid;
    gap: 12px;
  }

  .subject-card {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 78px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    color: inherit;
    text-decoration: none;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }

  a.subject-card:active {
    transform: scale(.985);
  }

  a.subject-card:focus-visible {
    outline: 3px solid rgba(47, 111, 207, .35);
    outline-offset: 2px;
  }

  a.subject-card:hover {
    border-color: #a9c5f1;
    box-shadow: 0 5px 14px rgba(31, 79, 156, .1);
  }

  .subject-card.is-disabled {
    background: #f8fafc;
    color: #94a3b8;
  }

  .subject-number {
    display: grid;
    place-items: center;
    flex: 0 0 42px;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--blue-pale);
    color: var(--blue);
    font-size: 14px;
    font-weight: bold;
  }

  .is-disabled .subject-number {
    background: #eef2f7;
    color: #94a3b8;
  }

  .subject-copy {
    min-width: 0;
    flex: 1;
  }

  .subject-name {
    display: block;
    font-size: 17px;
    font-weight: bold;
  }

  .subject-detail {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 13px;
  }

  .is-disabled .subject-detail {
    color: #94a3b8;
  }

  .subject-arrow {
    color: var(--blue);
    font-size: 24px;
    line-height: 1;
  }

  .is-disabled .subject-arrow {
    color: #cbd5e1;
  }

  .note {
    margin: 18px 2px 0;
    color: var(--muted);
    font-size: 13px;
  }

  footer {
    padding: 18px 4px 0;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <header class="hero">
    <p class="eyebrow">TAX ACCOUNTANT EXAM</p>
    <h1>税理士試験<br>3分チェック</h1>
    <p class="lead">学習した内容を、短時間でサッと確認しましょう。</p>
  </header>

  <section class="panel" aria-labelledby="subject-title">
    <h2 id="subject-title">科目を選択してください</h2>

    <div class="subject-list">
      <a class="subject-card" href="boki.html">
        <span class="subject-number">01</span>
        <span class="subject-copy">
          <span class="subject-name">簿記論</span>
          <span class="subject-detail">電子記録債権｜5問</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </a>

      <div class="subject-card is-disabled" aria-disabled="true">
        <span class="subject-number">02</span>
        <span class="subject-copy">
          <span class="subject-name">財務諸表論</span>
          <span class="subject-detail">準備中</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </div>

      <div class="subject-card is-disabled" aria-disabled="true">
        <span class="subject-number">03</span>
        <span class="subject-copy">
          <span class="subject-name">法人税法</span>
          <span class="subject-detail">準備中</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </div>

      <div class="subject-card is-disabled" aria-disabled="true">
        <span class="subject-number">04</span>
        <span class="subject-copy">
          <span class="subject-name">相続税法</span>
          <span class="subject-detail">準備中</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </div>

      <div class="subject-card is-disabled" aria-disabled="true">
        <span class="subject-number">05</span>
        <span class="subject-copy">
          <span class="subject-name">消費税法</span>
          <span class="subject-detail">準備中</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </div>

      <div class="subject-card is-disabled" aria-disabled="true">
        <span class="subject-number">06</span>
        <span class="subject-copy">
          <span class="subject-name">国税徴収法</span>
          <span class="subject-detail">準備中</span>
        </span>
        <span class="subject-arrow" aria-hidden="true">›</span>
      </div>
    </div>

    <p class="note">簿記論以外の科目は、原稿が準備でき次第追加します。</p>
  </section>

  <footer>スマートフォンでの閲覧に最適化しています。</footer>
</main>
</body>
</html>
